<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDP Laboratory</title>
    <link href="./css/index.css" rel="stylesheet" />
  </head>
  <body>
    <div class="login-header">
      <img src="./assets/msc-logo.svg" alt="MSC Industrial Supply Co." />
    </div>

    <div class="login-card">
      <h1>PDP Laboratory</h1>
      <p>Enter the password to continue</p>

      <div class="error-msg" id="errorMsg">Incorrect password. Please try again.</div>
      <div class="success-msg" id="successMsg">login Successfully</div>

      <form action="/api/login" method="POST">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password" required autofocus />
        <button type="submit">Sign In</button>
      </form>

      <div class="login-footer">MSC Industrial Supply Co. &mdash; Protected System</div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      if (params.get('error') === '1') {
        document.getElementById('errorMsg').classList.add('visible');
      }
      if (params.get('success') === '1') {
        document.getElementById('successMsg').classList.add('visible');
        document.getElementById('password').disabled = true;
        document.querySelector('button[type="submit"]').disabled = true;
        window.location.href = '/pdp';
      }
    </script>
  </body>
</html>
